services:
  web:
    build: .
    platform: linux/amd64
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=textlike
      - DB_PASS=textlike
      - DB_NAME=textlike

  db:
    image: mysql:5.6
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: textlike
      MYSQL_USER: textlike
      MYSQL_PASSWORD: textlike
    volumes:
      - textlike_data:/var/lib/mysql
      - ./db/textlike.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  textlike_data:
